<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Split Focus</title>
    <!-- Social Meta Tags -->
    <meta property="og:title" content="Split Focus - Dual Lane Survival" />
    <meta property="og:description"
        content="Test your reflexes! Control two players simultaneously and survive the falling neon blocks." />
    <meta property="og:image" content="https://placehold.co/1200x630/101020/ffcc55?text=Split+Focus" />
    <meta property="og:url" content="https://split-focus.game" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NTX74GN87P"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-NTX74GN87P');
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "v0fv4htbhm");
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="gameContainer">
        <div id="ui">
            <h1>Split Focus</h1>
            <p>Controls: <b>A</b> for Left, <b>L</b> for Right &bull; <b>P</b> to Pause &bull; Or tap each half</p>

            <div id="orientHint" class="orientHint" style="display:none" role="status" aria-live="polite">
                Best experienced in <b>portrait</b>. Rotate your phone for a clearer view.
            </div>

            <div id="topRow">
                <div id="scoreRow">
                    <span>Score: <span id="score">0</span></span>
                    <span>Best: <span id="bestScore">0</span></span>
                </div>
                <div id="btnRow">
                    <select id="difficultySelect" aria-label="Difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="adaptive">Adaptive</option>
                    </select>
                    <button id="pauseBtn" aria-label="Pause">Pause</button>
                    <button id="restartBtn" aria-label="Restart">Restart</button>
                    <button id="muteBtn" aria-label="Mute Audio">&#x1f50a;</button>
                    <button id="settingsBtn" aria-label="Settings">&#x2699;</button>
                    <button id="dashboardBtn" aria-label="Dashboard">&#x1f4ca;</button>
                </div>
            </div>

            <div id="message"></div>

            <!-- Game Over Overlay -->
            <div id="gameOverOverlay">
                <div class="stats-card">
                    <h2 style="margin:0; font-size:28px; font-weight:800; background:linear-gradient(to right, #fff, #bbb); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
                        Game Over</h2>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-val" id="finalScore" style="color:var(--accent);">0</div>
                            <div class="stat-label">Score</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-val" id="finalHigh">0</div>
                            <div class="stat-label">Best</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-val" id="statSwaps">0</div>
                            <div class="stat-label">Swaps</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-val" id="statDodged">0</div>
                            <div class="stat-label">Dodged</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-val" id="statDuration">0s</div>
                            <div class="stat-label">Duration</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-val" id="statSpeed">1.0x</div>
                            <div class="stat-label">Max Speed</div>
                        </div>
                    </div>

                    <!-- L/R Breakdown -->
                    <div id="lrBreakdown"></div>

                    <!-- AAI Gauge -->
                    <div style="text-align:center;">
                        <div id="aaiGauge" style="height:8px; background:rgba(255,255,255,0.06); border-radius:4px; position:relative; margin:8px 0;"></div>
                        <div id="aaiLabel" style="font-size:11px; color:var(--muted);"></div>
                    </div>

                    <!-- Timeline Chart -->
                    <canvas id="timelineCanvas" width="300" height="80" style="width:100%; height:80px; border-radius:8px; background:rgba(0,0,0,0.2);"></canvas>

                    <!-- Insights -->
                    <div id="insights" style="font-size:12px; color:var(--muted); text-align:left;"></div>

                    <button id="reviveBtn" class="btn-accent"
                        style="display:none; width:100%; justify-content:center; font-weight:600; padding:12px;">
                        Watch Ad to Revive
                    </button>

                    <div class="share-row">
                        <button id="btnTwitter" class="share-btn btn-x" aria-label="Share on X">&#x1d54f;</button>
                        <button id="btnWhatsapp" class="share-btn btn-wa" aria-label="Share on WhatsApp">&#x1f4ac;</button>
                        <button id="btnCopy" class="share-btn btn-copy" aria-label="Copy Link">&#x1f4cb;</button>
                    </div>
                    <div id="shareMsg">Share your score</div>

                    <button id="restartOverlayBtn" style="padding:12px; font-weight:600; font-family:inherit;">
                        &#x21ba; Play Again
                    </button>
                </div>
            </div>

            <div id="footer">
                <a href="https://buymeacoffee.com/bongquisitive" target="_blank" class="btn-coffee"
                    style="text-decoration:none; padding:8px 12px; border-radius:8px; font-size:12px;">&#x2615; Buy me a
                    Coffee</a>
            </div>

            <div id="history">
                <div class="hint">Last 5 tries</div>
                <div id="historyList"></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Panels (rendered by JS modules) -->
    <div id="settingsPanel"><div class="settings-content"></div></div>
    <div id="dashboardPanel"><div class="dashboard-content"></div></div>
    <div id="tutorialOverlay"></div>

    <!-- Achievement toast container -->
    <div id="achievementToastContainer"></div>

    <!-- Game Module -->
    <script type="module" src="js/game.js"></script>
</body>

</html>
